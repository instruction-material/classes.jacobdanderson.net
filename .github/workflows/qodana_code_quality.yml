name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  qodana:
    runs-on: ubuntu-latest
    env:
      QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
    steps:
      - name: Skip Qodana when QODANA_TOKEN is not configured
        if: env.QODANA_TOKEN == ''
        run: echo "QODANA_TOKEN is not configured; skipping Qodana."

      - uses: actions/checkout@v4
        if: env.QODANA_TOKEN != ''
        with:
          fetch-depth: 0

      - name: Qodana Scan
        if: env.QODANA_TOKEN != ''
        uses: JetBrains/qodana-action@v2023.2
        env:
          QODANA_TOKEN: ${{ env.QODANA_TOKEN }}
