name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    backend-install:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm
                  cache-dependency-path: back-end/package-lock.json

            - name: Pin npm version
              run: |
                  npm -v
                  npm i -g npm@11.12.0
                  npm -v

            - name: Install backend deps with backend lockfile
              working-directory: back-end
              run: npm ci

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm

            # Make runner's npm match packageManager in package.json
            - name: Pin npm version
              run: |
                  npm -v
                  npm i -g npm@11.12.0
                  npm -v

            - name: Install deps
              run: npm ci

            # Root "lint" runs front-end and back-end lint
            - name: Lint
              run: npm run lint

    typecheck:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm

            - name: Pin npm version
              run: |
                  npm i -g npm@11.12.0
                  npm -v

            - name: Install deps
              run: npm ci

            - name: Typecheck
              run: npm run typecheck

    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22.x]
                os: [ubuntu-latest]
            fail-fast: false

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix['node-version'] }}
                  cache: npm
                  registry-url: https://registry.npmjs.org/

            # Only pin npm if compatible
            - name: Pin npm version (if supported)
              run: |
                  # optional guard:
                  if [ $(node -v | cut -d. -f1 | sed 's/v//') -ge 20 ]; then
                    npm i -g npm@11.12.0
                  fi
                  npm -v

            - name: Install deps
              run: npm ci

            - name: Unit tests
              env:
                  VITEST_WATCH: "false"
              run: |
                  ulimit -n 4096 || true
                  npm run -w front-end test:unit

            - name: Backend tests
              env:
                  VITEST_WATCH: "false"
              run: npm run -w back-end test

    accessibility:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm

            - name: Pin npm version
              run: |
                  npm i -g npm@11.12.0
                  npm -v

            - name: Install deps
              run: npm ci

            - name: Axe accessibility smoke checks
              run: npm run a11y

    test-e2e:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm
                  registry-url: https://registry.npmjs.org/

            - name: Pin npm version
              run: |
                  npm i -g npm@11.12.0
                  npm -v

            - name: Install deps
              run: npm ci

            - uses: actions/cache@v4
              with:
                  path: ~/.cache/Cypress
                  key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

            - name: Build front-end
              run: npm run -w front-end build

            - name: Cypress
              uses: cypress-io/github-action@v6
              with:
                  install: false
                  working-directory: front-end
                  config-file: cypress.config.ts
                  start: npm run preview -- --port 3333
                  wait-on: "http://localhost:3333"

    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm

            - name: Pin npm version
              run: |
                  npm i -g npm@11.12.0
                  npm -v

            - name: Install deps
              run: npm ci

            - name: Build
              run: npm run build
