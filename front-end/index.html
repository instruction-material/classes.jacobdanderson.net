<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
			name="viewport"
		/>
		<title>Classes</title>

		<!-- Favicons -->
		<link href="/favicon.svg" rel="icon" type="image/svg+xml" />
		<link
			href="/favicon-32x32.png"
			rel="icon"
			sizes="32x32"
			type="image/png"
		/>
		<link
			href="/favicon-16x16.png"
			rel="icon"
			sizes="16x16"
			type="image/png"
		/>
		<link
			href="/apple-touch-icon.png"
			rel="apple-touch-icon"
			sizes="180x180"
		/>
		<link href="/site.webmanifest" rel="manifest" />

		<!-- Meta Tags -->
		<meta content="#3158e8" name="msapplication-TileColor" />
		<meta content="#3158e8" name="theme-color" />
		<meta content="Classes is dedicated to ..." name="description" />
		<meta content="index,follow" name="robots" />

		<script>
			(function () {
				const prefersDark =
					window.matchMedia &&
					window.matchMedia("(prefers-color-scheme: dark)").matches;
				const setting =
					localStorage.getItem("vueuse-color-scheme") || "auto";
				if (setting === "dark" || (prefersDark && setting !== "light"))
					document.documentElement.classList.toggle("dark", true);
			})();
		</script>
	</head>

	<body class="font-sans">
		<div id="app"></div>
		<script src="./src/main.ts" type="module"></script>
		<noscript>
			This website requires JavaScript to function properly. Please enable
			JavaScript to continue.
		</noscript>
	</body>
</html>
